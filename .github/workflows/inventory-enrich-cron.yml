name: Inventory BrickLink Enrichment

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 3:00am UTC
  workflow_dispatch: # Manual trigger

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger Inventory Enrichment
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "=== Triggering inventory BrickLink enrichment (max 1000 items) ==="

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$APP_URL/api/cron/inventory/enrich")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Enrichment failed"
            exit 1
          fi

          echo "✅ Enrichment complete"
